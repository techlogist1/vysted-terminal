name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable

      # GitHub's macos-latest image ships a non-standard Rust layout: every
      # ~/.cargo/bin proxy is a symlink to `rustup`, which symlinks to the
      # `rustup-init` binary. Point CARGO and PATH straight at the real
      # toolchain binary so tooling never resolves cargo to rustup-init.
      - name: Use the real rustup toolchain cargo (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          toolchain_bin="$(dirname "$(rustup which cargo)")"
          echo "CARGO=$toolchain_bin/cargo" >> "$GITHUB_ENV"
          echo "$toolchain_bin" >> "$GITHUB_PATH"
          "$toolchain_bin/cargo" --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all Python sidecar binaries
        run: node scripts/ensure-all-sidecars.mjs

      - name: Smoke-test sidecar binaries (catches PackageNotFoundError-at-runtime)
        run: node scripts/smoke-test-sidecars.mjs

      - name: Vitest (TypeScript)
        run: pnpm test

      - name: cargo test (Rust)
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: pytest (Python)
        working-directory: sidecar
        run: |
          python -m pip install -r requirements-dev.txt
          pytest
