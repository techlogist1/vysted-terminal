name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable

      - name: DEBUG cargo state after rust-toolchain
        shell: bash
        run: |
          echo "which cargo: $(command -v cargo || echo none)"
          file "$(command -v cargo)" || true
          cargo --version || echo "cargo --version FAILED"

      # Guarantee `cargo` resolves to the rustup proxy. On some macOS runner
      # images a stale binary shadows it and `cargo metadata` hits rustup-init.
      - name: Pin cargo to the rustup toolchain
        shell: bash
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup default stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: DEBUG cargo state before tauri build
        shell: bash
        run: |
          echo "=== PATH ==="; echo "$PATH" | tr ':' '\n'
          echo "=== which -a cargo ==="; which -a cargo || true
          echo "=== file cargo ==="; file "$(command -v cargo)" || true
          echo "=== cargo --version ==="; cargo --version || echo FAILED
          echo "=== cargo metadata (direct) ==="; (cd src-tauri && cargo metadata --no-deps --format-version 1 >/dev/null && echo OK || echo FAILED)
          echo "=== ls -la ~/.cargo/bin ==="; ls -la "$HOME/.cargo/bin" || true
          echo "=== which -a rustup-init ==="; which -a rustup-init || true
          echo "=== rustup which cargo ==="; rustup which cargo || true
          echo "=== env CARGO/RUSTUP ==="; env | grep -iE '^(CARGO|RUSTUP)' || true

      - name: Build Tauri bundle (unsigned)
        run: pnpm tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vysted-terminal-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**/*
          if-no-files-found: warn
